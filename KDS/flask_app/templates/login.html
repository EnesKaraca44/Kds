<!DOCTYPE html>
<html lang="tr" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giriş | KDS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body class="login-page">
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="login-logo">🏥</div>
                <h1>Kurum Analiz Paneli</h1>
                <p class="login-subtitle">Karar Destek Sistemi v2.0</p>
            </div>

            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
            {% for category, message in messages %}
            <div class="alert alert-{{ category }}">{{ message }}</div>
            {% endfor %}
            {% endif %}
            {% endwith %}

            <form method="POST" class="login-form">
                <div class="form-group">
                    <label for="username">Kullanıcı Adı veya TC Kimlik No</label>
                    <div class="input-wrapper">
                        <span class="field-icon">👤</span>
                        <input type="text" id="username" name="username" required placeholder="TC Kimlik No / Kullanıcı Adı"
                            autocomplete="username">
                    </div>
                </div>
                <div class="form-group">
                    <label for="password">Şifre</label>
                    <div class="input-wrapper">
                        <span class="field-icon">🔒</span>
                        <input type="password" id="password" name="password" required placeholder="Şifrenizi girin"
                            autocomplete="current-password">
                    </div>
                </div>
                <button type="submit" class="login-btn">
                    Sisteme Giriş Yap
                </button>
            </form>

            <div class="login-footer">
                <p>Kurum Karar Destek Sistemi v2.0 | © 2026 | MetaSoft</p>
            </div>
        </div>
    </div>
</body>

</html>
